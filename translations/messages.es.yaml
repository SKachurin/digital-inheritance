your_questions_explain: |
  Estas preguntas protegen tus datos sensibles.
  Tu Sobre se cifrará utilizando las respuestas que proporciones.

  Nunca almacenamos tus respuestas, ni siquiera en forma cifrada.
  Si las olvidas, los datos no podrán recuperarse.

  Tu respuesta no tiene que ser compleja.
  Debe ser evidente para la persona adecuada, pero no tener sentido para nadie más.

  Ejemplo: «El lugar donde pasamos nuestra luna de miel».

  Todos los intentos de adivinar las respuestas son lentos, están supervisados y estrictamente limitados.
  Si olvidas estas respuestas, el descifrado será imposible.

