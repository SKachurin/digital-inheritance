create_your_secure_envelope_text: |
  Aquí puedes almacenar cualquier tipo de información (con un límite de 10.000 caracteres). Puedes incluir frases semilla de criptomonedas, credenciales bancarias en línea, cartas personales, instrucciones o incluso un “mapa del tesoro” para tus seres queridos.

  Tu Sobre se cifra directamente en el navegador utilizando una clave aleatoria AES-256-GCM (DEK). Después, ese DEK se cifra localmente mediante una clave derivada de tu respuesta secreta (Argon2id + HKDF con vinculación estricta al contexto), generando un bloque INNER.

  Finalmente, el bloque INNER es protegido por múltiples Sistemas de Gestión de Claves (KMS) independientes para garantizar redundancia. Nunca almacenamos tus respuestas — solo se guarda información cifrada.

  Incluso con acceso completo a la base de datos, recuperar el contenido sin la respuesta correcta es criptográficamente inviable en la práctica.

  Cuando descifras para ver o editar, el sistema realiza una operación de desprotección en línea y con limitación de intentos a través del gateway KMS, luego descifra el Sobre en memoria y envía el texto plano mediante HTTPS. El contenido descifrado no se almacena.
dashboard:
  text: "¡Hola! 🤗"
  introduction_text_spoiler: "Primero lo primero"
  introduction_text_1: |
    Primero lo primero: aclaremos una vez más que todo lo que ingresas en esta aplicación se encripta en el momento en que lo envías, utilizando un protocolo bastante seguro.
    Esta página te guiará a través de todo el proceso de configuración: simplemente sigue los pasos uno a uno.<br><br>
    Configuraremos y verificaremos tus contactos para que podamos comprobar tu estado de 'última conexión' y enviarte mensajes si no pasas la verificación.
    Añade y verifica tantos contactos como necesites para tu constructor de Pipeline. Presta especial atención a los contactos de redes sociales, ya que se utilizan para verificar tu estado de 'última conexión' (lo que te ahorra la interacción directa a través de mensajeros). Lo que sea.<br>
    También presta atención al texto sobre y debajo de los campos del formulario: hemos tratado de explicar claramente el propósito de cada campo.
    La lógica básica de este sistema es bastante simple:<br>
     - Verifica tus contactos.<br>
     - Añade contactos para tu Heredero (no se requiere verificación para ellos).<br>
     - Encripta el mensaje.<br>
     - Elige cómo verificamos tu estado (Pipeline).

  more_security_spoiler: "Más Sobre Seguridad"
  more_security_text: |
    En nuestra base de datos, todo está cifrado excepto tu dirección de correo electrónico principal. Incluso en caso de una filtración completa de la base de datos, el único campo legible sería ese correo electrónico.

    Los contactos y los campos de la cuenta se cifran en reposo en nuestros servidores utilizando libsodium (XSalsa20-Poly1305), un esquema de cifrado autenticado ampliamente reconocido y fiable.
    El Sobre utiliza un protocolo de cifrado independiente en el lado del cliente (AES-256-GCM + Argon2id + HKDF + envoltura mediante KMS), en el que el cifrado se realiza en tu navegador antes de que cualquier dato se envíe a nuestros servidores.
  
    Para cifrar el Sobre, el material criptográfico se deriva de tus respuestas secretas y se combina con claves mantenidas por la infraestructura mediante un proceso de envoltura en varias etapas.
    Dado que tus respuestas nunca se almacenan en ningún lugar, el Sobre debe descifrarse cada vez antes de ser editado — esto garantiza que nunca se persistan datos en texto plano ni material de recuperación.

  delete_account: 'Eliminar mi cuenta'
  delete_account_tip: 'De acuerdo con las normas del RGPD, puedes eliminar todos tus datos de esta aplicación.'
  make_a_payment: 'Realice un Pago'
  make_a_payment_tip: "Si este botón está en rojo, significa que el Pipeline no verificará tu estado en línea ni enviará un mensaje a tu heredero."
  create_your_pipeline: 'Cree su Pipeline'
  create_your_pipeline_tip: |
    Un Pipeline es una secuencia de acciones que el sistema utiliza para comprobar periódicamente si estás bien.
    <br><br>
    Las acciones se habilitan para cada contacto que hayas verificado, y puedes combinarlas para crear un Pipeline.<br>
    Ejemplo de un Pipeline de un solo paso: <br>
    Configuras la acción: "Si no estoy en línea en Telegram durante 1 día, envíame un mensaje por WhatsApp y espera 1 hora mi respuesta."
    Si no estás en línea en Telegram durante un día, el sistema te enviará un mensaje por WhatsApp y esperará 1 hora para recibir tu contraseña OK (que puede estar oculta dentro de cualquier texto de tu respuesta).
    <br><br>
    Si respondes a tiempo con la contraseña correcta, el sistema se reinicia y espera el siguiente ciclo.<br>
    Si no respondes a tiempo o la contraseña es incorrecta, el Pipeline finaliza.<br>
    Cuando el Pipeline finaliza, el sistema genera enlaces dinámicos que permiten a tu Heredero intentar descifrar tu Sobre y los envía a todos los contactos que hayas proporcionado para tu Heredero.
    <br><br>
    Nota: Editar o guardar el Pipeline lo reinicia (comienza desde el principio).
  edit_your_pipeline: 'Editar su Pipeline'
  edit_your_pipeline_tip: 'Guardar el Pipeline lo reinicia. Si necesita más Acciones, verifique más Contactos.'
  create_your_secure_envelope: 'Cree su Sobre Seguro'
  create_your_secure_envelope_tip: "Este texto se cifrará utilizando las respuestas a tus preguntas secretas."
  create_your_secure_envelope_switch: |
    Cifrar en el navegador.
    Debes permanecer en la página hasta que el proceso de cifrado finalice. Esta es la única opción disponible,
    ya que este enfoque garantiza que nuestro backend nunca tenga acceso a tus datos sin cifrar.
  edit_your_secure_envelope_note: |
    Ten en cuenta que al usar la función «Editar Sobre», el descifrado se realiza en nuestro servidor. 
    Esto es necesario para controlar el número de intentos de descifrado y aplicar breves pausas para evitar ataques de fuerza bruta. 
    Si prefieres no procesar el texto descifrado en nuestro servidor, puedes eliminar el Sobre actual y crear uno nuevo. 
    Recomendamos este método como medida de seguridad adicional, aunque nuestro código es de código abierto y puedes comprobar que no se guardan datos descifrados ni contraseñas.
