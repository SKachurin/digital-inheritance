note_creation:
  default_text: |
    Замените этот текст на Ваши данные:
    
      Здесь вы можете хранить любые данные (с ограничением до 10 000 символов). Это могут быть seed-фразы криптокошельков, доступы к онлайн-банкингу, личные письма, инструкции или даже «карта сокровищ» для ваших близких.

    Ваш Конверт шифруется прямо в браузере с использованием случайного ключа AES-256-GCM (DEK). Затем этот DEK дополнительно шифруется локально с помощью ключа, производного от вашего секретного ответа (Argon2id + HKDF с жесткой привязкой к контексту), формируя INNER-блок.

    После этого INNER-блок оборачивается несколькими независимыми системами управления ключами (KMS) для обеспечения отказоустойчивости. Мы никогда не сохраняем ваши ответы — в базе хранится только зашифрованная информация.

    Даже при полном доступе к базе данных восстановить содержимое без правильного ответа криптографически невозможно на практике.

    При расшифровке для просмотра или редактирования система выполняет онлайн-запрос к KMS-шлюзу с ограничением частоты попыток, затем расшифровывает Конверт в памяти сервера и передает открытый текст по HTTPS. Расшифрованные данные не сохраняются.

if_decoded_can_edit: |
  Если вам удалось расшифровать текст и вы видите его выше, вы можете скопировать его (например, в Блокнот), удалить текущий Конверт и создать новый с обновлённым текстом и вопросами.
  Это самый чистый и безопасный способ редактирования Конверта.

onboarding_page:
  title: "Как протестировать сервис"
  description: "Краткое пошаговое руководство по тестированию The Digital Heir от начала до конца."
  introduction:
    text: |
      Чтобы безопасно протестировать полную логику The Digital Heir, используйте свои собственные контактные данные как контактные данные Наследника. Тогда, когда Pipeline завершится, ссылка доступа вернётся к вам, и вы сможете увидеть весь процесс доставки с обеих сторон.
      <br>
      Всё просто: добавьте и подтвердите свои контакты, добавьте Наследника, создайте Конверт, настройте Pipeline, а затем проверьте, что произойдёт, когда Pipeline дойдёт до конца.

  why_choose:
    title: "Что именно вы тестируете"
    item1:
      title: "1. Подтверждение контактов"
      bullet1: "Добавьте свои email, номера телефонов и Telegram."
      bullet2: "Подтвердите каждый контакт, который хотите использовать в Pipeline."
      bullet3: "Подтверждённые контакты становятся доступными как действия в конструкторе Pipeline."

    item2:
      title: "2. Сценарий доставки Наследнику"
      bullet1: "Создайте профиль Наследника, используя свои запасные контактные данные для теста."
      bullet2: "Контакты Наследника не подтверждаются при настройке, поэтому Наследнику не нужно заранее ничего делать."
      bullet3: "Когда Pipeline завершится, система сгенерирует и отправит специальную ссылку доступа на указанные вами контакты Наследника."

    item3:
      title: "3. Шифрование Конверта"
      bullet1: "Создайте защищённый Конверт и защитите его секретными вопросами."
      bullet2: "Ваш текст шифруется до сохранения, а сами ответы никогда не хранятся."

    item4:
      title: "4. Логика Pipeline"
      bullet1: "Постройте последовательность действий, с помощью которых система будет проверять, всё ли с вами в порядке."
      bullet2: "Вы сами выбираете и тип действия, и интервал ожидания."
      bullet3: "Если вы вовремя ответите своим паролем, Pipeline сбросится. Если нет — завершится."

    item5:
      title: "5. Финальный сценарий передачи"
      bullet1: "Когда Pipeline завершается, система создаёт ссылку с ограниченным сроком действия."
      bullet2: "Эта ссылка отправляется на все контакты Наследника, которые вы указали."
      bullet3: "Используя эту ссылку, Наследник может попытаться расшифровать Конверт, ответив на секретный вопрос."

  how_it_works:
    title: "Пошаговое тестирование"
    item1:
      title: "Шаг 1. Добавьте и подтвердите свои контакты"
      bullet1: "Сначала добавьте свои email, номера телефонов и Telegram."
      bullet2: "После добавления каждого контакта откройте Edit и отправьте код подтверждения."

    item2:
      title: "Шаг 2. Создайте Наследника"
      bullet1: "Добавьте профиль Наследника с никнеймом, языком и контактными данными."
      bullet2: "Для теста используйте свои альтернативные контактные данные как данные Наследника."
      bullet3: "Именно на эти контакты Наследника придёт ссылка доступа, когда Pipeline завершится."

    item3:
      title: "Шаг 3. Создайте свой защищённый Конверт"
      bullet1: "Напишите в Конверте текст, который хотите защитить."
      bullet2: "Задайте хотя бы один секретный вопрос и ответ."
      bullet3: "Ответ должен быть запоминающимся для нужного человека, но сложным для угадывания посторонними."

    item4:
      title: "Шаг 4. Настройте Pipeline"
      bullet1: "Выберите, как именно система должна проверять, всё ли с вами в порядке."
      bullet2: "Доступные действия зависят от того, какие из ваших контактов уже подтверждены."
      bullet3: "Сохраните Pipeline, чтобы активировать его."

    item5:
      title: "Шаг 5. Поймите результат"
      bullet1: "Если вы вовремя ответите правильным Okay Password, Pipeline сбросится."
      bullet2: "Если вы не ответите вовремя или ответ будет неверным, Pipeline завершится."
      bullet3: "После этого система отправит ссылку доступа на контакты Наследника."

    item6:
      title: "Шаг 6. Протестируйте сторону Наследника"
      bullet1: "Откройте ссылку, отправленную на контакт Наследника."
      bullet2: "Попробуйте расшифровать Конверт, ответив на секретный вопрос."
      bullet3: "Это позволяет протестировать весь путь доставки и доступа от начала до конца."

  reminder:
    title: "Важные замечания"
    bullet1: "Используйте свои собственные контактные данные как данные Наследника только для тестирования."
    bullet2: "Бесплатный пробный период длится 3 дня."
    bullet3: "После окончания пробного периода система перестанет проверять вашу активность, если у вас нет платного плана."
    bullet4: "Редактирование и повторное сохранение Pipeline сбрасывает его и запускает цикл заново."
    bullet5: "Вы также можете присоединиться к реферальной программе из панели управления."
