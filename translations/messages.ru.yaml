faq:
  title: 'Часто задаваемые вопросы'
  q1: 'Что такое сервис «Цифровой Наследник» и как он работает?'
  a1: |
    «Цифровой Наследник» — это платформа, которая обеспечивает сохранность вашей важной цифровой информации — например, 
    логинов, ключей от криптокошельков или других конфиденциальных данных — в безопасной, зашифрованной «заметке». 
    Мы периодически проверяем ваш онлайн-статус (через социальные сети, WhatsApp, электронную почту или любые каналы, 
    которые вы настроите). Если вы не проявляете активность дольше заданного промежутка и не отвечаете на наши 
    сообщения-подтверждения, мы передаём защищённую ссылку вашему назначенному наследнику. 
    Он сможет разблокировать вашу информацию, только ответив правильно на ваши секретные вопросы.

  q2: 'Безопасны ли мои данные? Как вы обеспечиваете защиту моей информации?'
  a2: |
    Да. Все ваши данные — включая секретные вопросы и контактные данные вашего Наследника — шифруются до сохранения.
    Контакты и поля учётной записи шифруются «на хранении» на наших серверах с использованием libsodium (XSalsa20-Poly1305).
    Конверт использует отдельную схему клиентского шифрования (AES-256-GCM + Argon2id + HKDF + KMS-обёртка) и может быть расшифрован только при вводе правильных секретных ответов.
  
    Мы никогда не сохраняем ваши секретные ответы или производные ключи — они существуют только в вашей памяти.
    После шифрования ваши конфиденциальные данные остаются заблокированными до тех пор, пока не будут предоставлены правильные ответы.

  q3: 'Нужно ли мне предоставлять юридические документы, например, свидетельство о смерти?'
  a3: |
    Нет. Наш сервис полностью независим от местных или национальных законов о наследовании. 
    Мы проверяем ваше состояние с помощью автоматических запросов — если вы не отвечаете в течение заданного периода, 
    ссылка на ваш секретный конверт приходит на указанные контакты наследника. Никаких свидетельств о смерти или других документов не требуется.

  q4: 'Как вы отслеживаете, что я всё ещё активен, и что запускает передачу моих данных?'
  a4: |
    Вы сами определяете «Пайплайн» действий в настройках аккаунта: это может быть проверка «последнего визита» в соцсетях 
    или отправка вам сообщений по email, WhatsApp либо SMS. Если вы не отвечаете в заданные сроки, система переходит 
    к следующим шагам. Когда все попытки связаться с вами исчерпаны, мы предполагаем, что вы недоступны, 
    и отправляем ссылку вашему наследнику, чтобы он мог попытаться расшифровать заметку.

  q5: 'Нужно ли заранее уведомлять наследника, или ему потребуется своя учётная запись?'
  a5: |
    Нет. Вы можете добавить контактные данные наследника (email, телефон и т. д.) без его уведомления. 
    Ему не нужно регистрироваться или предпринимать какие-либо действия, пока система не решит, 
    что пришло время передать заметку. В этот момент наследник получит инструкции по расшифровке, 
    где ему понадобится ответить на ваши секретные вопросы.

  q6: 'Что, если мой наследник не знает правильных ответов на секретные вопросы?'
  a6: |
    Если наследник не сможет дать точные ответы, заметка останется зашифрованной. У него есть несколько попыток, 
    но при отсутствии правильного ответа доступ будет невозможен. Такой механизм предотвращает несанкционированный доступ 
    и гарантирует, что только тот, кто действительно знает ваши секреты, сможет их открыть.

  q7: 'Сколько это стоит и что будет, если я перестану платить?'
  a7: |
    Сервис стоит небольшую ежемесячную плату (несколько долларов в месяц) за постоянное обслуживание. 
    Рассматривайте это как страховой полис для ваших цифровых активов. Если вы перестанете платить, 
    ваш Пайплайн будет отключён после некоторого льготного периода, и зашифрованная заметка никому не передастся.

  q8: 'Могу ли я хранить несколько заметок или большой объём данных?'
  a8: |
    На данный момент в одной учётной записи можно создать только одну «заметку». 
    Она может содержать до 10000 символов текста, куда вы можете включить любые учетные данные, инструкции или сообщения. 
    Если вам нужно больше заметок, придётся регистрировать дополнительные аккаунты.

  q9: 'Что делать, если я забуду ответы на секретные вопросы или потеряю основной пароль?'
  a9: |
    Ваш основной пароль нужен только для входа в сервис; его утеря не означает автоматическую утечку зашифрованных данных. 
    Однако если вы забудете ответы на секретные вопросы, никто — включая нас — не сможет расшифровать заметку, 
    так как мы не храним эти ответы нигде. Всегда храните их в голове или в надёжном месте.

  q10: 'Могу ли я обновить заметку, данные наследника или Пайплайн после настройки?'
  a10: |
    Разумеется. Вы можете в любое время войти в свою панель управления, чтобы отредактировать заметку (сначала нужно её расшифровать, 
    введя верные ответы), изменить контактные данные наследника или перенастроить Пайплайн. 
    Любые изменения требуют повторного шифрования, поэтому убедитесь, что вы помните свои ответы.  

  q11: 'Можно ли увидеть ваш открытый репозиторий, чтобы убедиться, что код реально соответствует заявленной безопасности?'
  a11: |
    Да, мы стремимся к прозрачности и доверию. Ссылка на наш GitHub-репозиторий 
    находится внизу сайта (в футере). Вы можете сами посмотреть код, отследить процесс 
    его развития и оценить, как мы реализуем меры безопасности. Мы всячески приветствуем 
    независимую проверку, чтобы вы убедились: всё, что мы заявляем, действительно работает 
    именно так в программном коде.

  q12: 'Правда ли, что абсолютно невозможно постороннему человеку получить доступ к моему «Конверту»?'
  a12: |
    Фактически да — при нормальных условиях постороннему лицу невозможно расшифровать 
    ваши данные. Мы никогда не храним ответы на секретные вопросы, и только указанные вами 
    контакты получат ссылку на ваш «Конверт». Без правильных ответов никто (даже мы) не 
    сможет его открыть. 
    Возможно, даже после всего прочитанного вам не до конца комфортно доверять нам самые сокровенные тайны — и это нормально.
    Вы можете использовать наш сервис скорее как своего рода ‘посредника’ или безопасный указатель: например, просто оставить подсказки, 
    где действительно хранится важная информация или в какой книге на полке лежат нужные данные. 
    В итоге доступ к этим наводкам получит только человек, знающий правильные ответы и только в нужный момент.
    
    Благодаря этому наш сервис отлично подходит не только для 
    хранения цифровых паролей, но и для секретных заметок: например, где у вас спрятан 
    «сундучок с сокровищами» или в какой книге в домашней библиотеке лежат важные документы.

  q13: "Почему мы используем выражения «при нормальных условиях» и «практически невозможно» в наших заявлениях о безопасности?"
  a13: |
    Когда речь идёт о шифровании, ничто не является на 100% неуязвимым, если у злоумышленника есть неограниченное время и сверхмощные вычислительные ресурсы. 
    Под «нормальными условиями» мы понимаем, что при выборе разумных секретных ответов и соблюдении безопасности ваших устройств взлом вашего Конверта на нашей платформе потребовал бы ресурсов, значительно превышающих реально доступные.
    Формулировка «практически невозможно» означает, что в повседневном использовании вероятность успешной атаки настолько мала, что не представляет практической угрозы — хотя теоретически идеальных систем не существует.

  q14: 'Может ли мой «Конверт» быть скомпрометирован, если кто-то физически украдёт серверы или произойдёт утечка данных?'
  a14: >
    Даже если наши серверы будут физически похищены или взломаны, все хранимые данные 
    надёжно зашифрованы. Ключевой момент — мы никогда не сохраняем ответы на ваши секретные вопросы, 
    поэтому злоумышленники получат только шифрованные данные без способа их расшифровать. 
    Пока ваши вопросы и ответы известны только вам (и вашему наследнику), ваш «Конверт» остаётся 
    в безопасности, независимо от того, что случится с нашим оборудованием.

  q15: "Что если систему взломают, на вас окажут давление или юридически принудят?"
  a15: |
    Система спроектирована так, что ни оператор, ни основатель не могут получить доступ к пользовательским Конвертам — даже под давлением.

  q16: "Что если будущие квантовые компьютеры смогут взломать современные методы шифрования?"
  a16: |
    В настоящее время современные алгоритмы шифрования, такие как XSalsa20-Poly1305 и AES-256-GCM, остаются крайне надёжными против всех известных классических компьютеров.
    Масштабные квантовые вычисления могут изменить криптографический ландшафт в будущем, однако на сегодняшний день не существует публично известных квантовых машин, способных реально взломать эти схемы.
  
    Если на практике когда-либо потребуется квантово-устойчивое шифрование, мы соответствующим образом адаптируем нашу криптографию.
contact_page:
  title: 'Напиши нам'
  info_1_title: "Есть идея?"
  info_1_text: |
    Мы постоянно ищем способы улучшить "The Digital Heir", чтобы лучше служить вам. 
    Если у вас есть идея, как сделать наш сервис ещё более полезным или удобным, мы хотим об этом узнать! 
    Не стесняйтесь — ваш отзыв может повлиять на будущее цифрового наследства.
  info_2_title: "Нашли ошибку или баг?"
  info_2_text: |
    Ой! Если вы обнаружили баг или ошибку при использовании платформы, мы уже работаем над этим! 
    Помогите нам сделать "The Digital Heir" более надёжным и плавным, сообщив, что пошло не так. 
    Ваше мнение бесценно для обеспечения бесперебойной работы.
  info_3_title: "Комментарии по формулировкам или переводу?"
  info_3_text: |
    Ваши слова имеют значение! Особенно если вы просматриваете сайт и что-то кажется неясным или некорректным, нам очень нужна ваша помощь. 
    Наша цель — чёткое общение на всех языках. Если вы заметили неуклюжие фразы или знаете, как выразиться лучше, не держите это в себе — поделитесь с нами!


