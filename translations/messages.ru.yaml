home_page:
  title: 'Представляем сервис «Цифровой Наследник»'
  description: 'Новое и безопасное решение для наследования цифровых активов.'
  first_text: |
    Есть ли у вас какая-либо форма страховки? Подумайте об этом сервисе как о способе гарантировать, что ваши цифровые активы попадут в "правильные" руки, если с вами что-то случится.
    Да, настройка требует немного времени и сервис стоит несколько долларов в месяц, но как только все будет настроено, мы будем постоянно отслеживать ваш «последний вход» на выбранных вами платформах. Если ваша неактивность превысит установленный вами порог, мы отправим вам сообщение с просьбой подтвердить, что с вами все в порядке.
    Если ответа не последует, ваши цифровые активы будут безопасно переданы указанным вами контактам.

  learn_more: "Подробнее"
  register: 'Зарегистрируйся бесплатно'
  text_title: 'Сохрани свое наследие'
  info_1_text: 'В «Цифровой Наследник» мы призываем вас защитить доступ к вашим цифровым активам — чтобы ваши близкие могли воспользоваться ими, когда вас уже не будет в сети. Все просто, как раз, два, три — войдите в систему, зашифруйте свои доступы, инструкции или даже трогательное послание и добавьте контакты вашего наследника.'
  info_2_text: 'Вы полностью контролируете процесс: решаете, как мы будем отслеживать вашу активность, когда и куда отправлять сообщения-проверки, а также в каких случаях данные будут переданы вашему наследнику. Теперь ваши крипто кошельки, счета на биржах и оффшорные счета не исчезнут бесследно — они принесут пользу вашим родным и близким.'
  info_3_text: |
    В конце концов, как писал Михаил Булгаков в Мастере и Маргарите, «Рукописи не горят.»
