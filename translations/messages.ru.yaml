create_your_secure_envelope_text: |
  Здесь вы можете хранить любые данные (с ограничением до 10 000 символов). Это могут быть seed-фразы криптокошельков, доступы к онлайн-банкингу, личные письма, инструкции или даже «карта сокровищ» для ваших близких.

  Ваш Конверт шифруется прямо в браузере с использованием случайного ключа AES-256-GCM (DEK). Затем этот DEK дополнительно шифруется локально с помощью ключа, производного от вашего секретного ответа (Argon2id + HKDF с жесткой привязкой к контексту), формируя INNER-блок.

  После этого INNER-блок оборачивается несколькими независимыми системами управления ключами (KMS) для обеспечения отказоустойчивости. Мы никогда не сохраняем ваши ответы — в базе хранится только зашифрованная информация.

  Даже при полном доступе к базе данных восстановить содержимое без правильного ответа криптографически невозможно на практике.

  При расшифровке для просмотра или редактирования система выполняет онлайн-запрос к KMS-шлюзу с ограничением частоты попыток, затем расшифровывает Конверт в памяти сервера и передает открытый текст по HTTPS. Расшифрованные данные не сохраняются.

dashboard:
  text: "Привет! 🤗"
  introduction_text_spoiler: "Сначала о главном"
  introduction_text_1: |
    Сначала о главном — давайте ещё раз уточним: всё, что вы вводите в этом приложении, шифруется в момент сохранения с использованием надёжного протокола.
    Эта страница поможет вам пройти весь процесс настройки — просто двигайтесь по кнопкам сверху вниз.<br><br>
    Мы настроим и проверим ваши контакты, чтобы отслеживать ваш статус 'в сети' и отправлять вам сообщения, если проверка не пройдена.
    Добавьте и подтвердите столько контактов, сколько нужно для Конструктора уведомлений. Особое внимание уделите социальным контактам, так как они используются для проверки статуса 'в сети' (что избавляет вас от прямого взаимодействия через мессенджеры). По желанию.<br>
    Также обратите внимание на текст над и под полями формы — мы постарались чётко объяснить назначение каждого поля.
    Основная логика системы проста:<br>
     - Подтвердите свои контакты.<br>
     - Добавьте контакты для своего Наследника (для них подтверждение не требуется).<br>
     - Зашифруйте сообщение.<br>
     - Выберите способ проверки вашего статуса (Последовательность).

  more_security_spoiler: "Подробнее о Безопасности"
  more_security_text: |
    В нашей базе данных всё зашифровано, за исключением вашего основного адреса электронной почты. Даже в случае полной утечки базы данных единственным читаемым полем будет именно этот адрес.

    Контакты и поля аккаунта шифруются на наших серверах «на хранении» с использованием libsodium (XSalsa20-Poly1305) — широко признанной и надёжной схемы аутентифицированного шифрования.
    Конверт использует отдельный протокол клиентского шифрования (AES-256-GCM + Argon2id + HKDF + обёртка через KMS), при котором шифрование выполняется в вашем браузере до отправки данных на наши серверы.
  
    Для шифрования Конверта криптографический материал формируется на основе ваших секретных ответов и объединяется с ключами инфраструктуры через многоэтапный процесс обёртки.
    Поскольку ваши ответы нигде не сохраняются, Конверт должен расшифровываться каждый раз перед редактированием — это гарантирует, что открытый текст и материалы для восстановления никогда не сохраняются.

  delete_account: 'Удалить мой аккаунт'
  delete_account_tip: 'В соответствии с правилами GDPR, вы можете удалить все свои данные из этого приложения.'
  create_your_pipeline: 'Создайте ваш Конструктор'
  create_your_pipeline_tip: |
    Pipeline — это последовательность действий, которые система использует для регулярной проверки того, что с вами всё в порядке.
    <br><br>
    Действия становятся доступными для каждого подтверждённого контакта, и вы можете объединять их, создавая Pipeline.<br>
    Пример Pipeline из одного шага:<br>
    Вы настраиваете действие: «Если я не появляюсь в Telegram в течение 1 дня, отправить мне сообщение в WhatsApp и ждать ответ в течение 1 часа».
    Если вы не были онлайн в Telegram в течение дня, система отправит вам сообщение в WhatsApp и будет ждать 1 час, чтобы получить ваш OK-пароль (который может быть скрыт в любом тексте вашего ответа).
    <br><br>
    Если вы ответили вовремя и пароль верный, система сбрасывается и ждёт следующего цикла.
    Если вы не ответили вовремя или пароль неверный, Pipeline завершается.
    Когда Pipeline завершается, система генерирует динамические ссылки, которые позволяют вашему Наследнику попытаться расшифровать ваш Конверт, и отправляет их всем контактам, указанным для Наследника.
    <br><br>
    Примечание: Редактирование или сохранение Pipeline сбрасывает его и запускает заново.
  edit_your_pipeline: 'Редактировать ваш Конструктор'
  edit_your_pipeline_tip: 'Сохранение Конструктора приведет к его сбросу. Если вам нужно больше действий – подтвердите дополнительные контакты.'
  create_your_secure_envelope: 'Создайте ваш защищенный конверт'
  create_your_secure_envelope_tip: "Этот текст будет зашифрован с использованием ответов на ваши секретные вопросы."
  create_your_secure_envelope_switch: |
    Шифровать в браузере. Вам необходимо оставаться на странице до завершения шифрования. Это единственный доступный вариант,
    поскольку такой подход гарантирует, что наш сервер никогда не получает доступ к вашим незашифрованным данным.
  edit_your_secure_envelope_note: |
    Обратите внимание: при использовании функции «Редактировать Конверт» расшифровка выполняется на нашем сервере. 
    Это необходимо, чтобы контролировать количество попыток расшифровки и применять задержки для защиты от подбора пароля. 
    Если вы не хотите, чтобы расшифрованный текст обрабатывался на нашем сервере, вы можете удалить текущий Конверт и создать новый. 
    Мы рекомендуем этот способ для дополнительной безопасности - даже несмотря на то, что наш код открыт, и вы можете убедиться, что расшифрованные данные и пароли нигде не сохраняются.
  edit_your_secure_envelope_tip: 'Для редактирования сначала расшифруйте его с помощью ответов на ваши секретные вопросы.'
  delete_your_secure_envelope: 'Удалить ваш защищенный конверт'
  create_your_heir: 'Создать вашего цифрового наследника'
  create_your_heir_tip: "Ваш цифровой наследник получит приглашение для расшифровки конверта, когда Конструктор достигнет конца."
